<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>良興主管公會 - 雲端勇者養成系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #18181b;
            color: white;
            touch-action: manipulation;
        }

        .pixel-font { font-family: 'DotGothic16', sans-serif; }

        .pixel-border {
            border: 4px solid #ffffff;
            box-shadow: 4px 4px 0 0 #000000;
        }

        .pixel-btn { transition: all 0.1s; cursor: pointer; }
        .pixel-btn:active:not(:disabled) {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 0 #000000;
        }
        .pixel-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .screen { display: none; }
        .screen.active { display: flex; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .avatar-animate { animation: float 3s ease-in-out infinite; }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .card-pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body class="min-h-screen relative overflow-hidden bg-zinc-900 border-x border-zinc-800" id="app-body">

    <!-- ======================================================= -->
    <!-- ⚙️  設定區：部署 GAS 後請將 URL 貼在這裡               -->
    <!-- ======================================================= -->
    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbytce_nhi-kmiCIWkcePJYo6Sa85C9lJUDMEisUAjEgPc0d8niEl7Nfm1pknhpIlhlUkQ/exec';
        // 例如：'https://script.google.com/macros/s/AKfyc.../exec'

        async function callAPI(action, params = {}) {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                // 使用 text/plain 避免 CORS preflight 問題
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action, ...params })
            });
            if (!res.ok) throw new Error(`HTTP 錯誤：${res.status}`);
            return res.json();
        }
    </script>

    <div id="global-loader" class="absolute inset-0 bg-zinc-900 z-[100] flex flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <div class="pixel-font text-blue-400" id="loader-text">與公會伺服器連線中...</div>
    </div>

    <div id="scan-results-modal" class="absolute inset-0 bg-zinc-950/90 z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-zinc-900 pixel-border p-4 w-full max-w-sm relative shadow-[0_0_20px_#10b981]">
            <h3 class="text-xl pixel-font text-green-400 mb-1 text-center animate-pulse" id="modal-title">✨ 掃描解析完成 ✨</h3>
            <p class="text-[10px] text-zinc-400 text-center mb-4" id="modal-subtitle">請挑選 <span class="text-yellow-400 font-bold">1 項</span> 最適合的風格：</p>
            <div id="scan-options-container" class="max-h-[60vh] overflow-y-auto mb-4 space-y-3"></div>
            <button onclick="closeModal('scan-results-modal')" class="w-full bg-zinc-700 text-white p-3 pixel-font text-sm border-2 border-zinc-500 hover:bg-zinc-600 transition-colors">保留現狀 / 稍後決定</button>
        </div>
    </div>

    <div id="qr-scanner-modal" class="absolute inset-0 bg-zinc-950/95 z-50 hidden flex-col items-center justify-center p-4">
        <div class="bg-zinc-900 pixel-border p-4 w-full max-w-sm relative flex flex-col max-h-[95vh] overflow-y-auto">
            <h3 class="text-lg pixel-font text-yellow-400 mb-2 text-center">📷 掃描或輸入戰術卡</h3>
            <p class="text-[10px] text-zinc-400 text-center mb-2">請對準卡片 QR Code，或直接輸入底部代碼</p>

            <div id="qr-reader" class="w-full bg-black min-h-[250px] mb-4"></div>

            <div class="border-t-2 border-zinc-700 pt-4 mb-4">
                <label class="block text-xs pixel-font mb-2 text-zinc-400">手動輸入代碼 (若相機無法開啟)</label>
                <div class="flex gap-2">
                    <input type="text" id="manual-code-input" placeholder="例如：FLA-01" class="flex-grow bg-zinc-800 text-white p-2 border border-zinc-600 pixel-font outline-none uppercase">
                    <button onclick="submitManualCode()" class="pixel-btn bg-indigo-600 text-white px-4 pixel-font text-sm border-2 border-indigo-400 whitespace-nowrap">送出</button>
                </div>
            </div>

            <button onclick="stopQrScanner()" class="w-full bg-red-700 text-white p-3 pixel-font text-sm border-2 border-red-500">關閉視窗</button>
        </div>
    </div>

    <!-- 登入畫面 -->
    <div id="screen-login" class="screen active flex-col h-screen p-6 justify-center max-w-md mx-auto relative">
        <div class="text-center mb-6">
            <h1 class="text-2xl pixel-font text-blue-400 mb-2">良興主管公會</h1>
            <p class="text-xs text-zinc-400">請輸入資料以喚醒您的專屬角色</p>
        </div>

        <div class="bg-zinc-800 p-5 pixel-border mb-6 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
            <label class="block text-xs pixel-font mb-2 text-zinc-400">所屬部門</label>
            <select id="dept-input" class="w-full bg-zinc-700 text-white p-3 mb-4 border-2 border-zinc-900 pixel-font outline-none">
                <option value="">載入中...</option>
            </select>

            <label class="block text-xs pixel-font mb-2 text-zinc-400">真實姓名</label>
            <input type="text" id="name-input" placeholder="例如：王大明" class="w-full bg-zinc-700 text-white p-3 mb-4 border-2 border-zinc-900 pixel-font outline-none">

            <label class="block text-xs pixel-font mb-2 text-yellow-400">通關密碼 (員工編號)</label>
            <input type="password" id="password-input" placeholder="請輸入員編" class="w-full bg-zinc-700 text-white p-3 mb-2 border-2 border-zinc-900 pixel-font outline-none uppercase tracking-widest">
        </div>

        <button onclick="login()" class="pixel-btn w-full bg-blue-600 p-4 text-center pixel-font text-xl pixel-border font-bold">
            驗證並進入公會 ✦
        </button>

        <div class="mt-8 text-center border-t border-zinc-700 pt-4">
            <button onclick="openAdminBoard()" class="text-xs text-zinc-500 hover:text-yellow-400 pixel-font transition-colors">
                🖥️ 開啟大螢幕投影模式 (HR專用)
            </button>
        </div>
    </div>

    <!-- Dashboard 畫面 -->
    <div id="screen-dashboard" class="screen flex-col h-screen p-4 max-w-md mx-auto">
        <div class="flex justify-between items-end mb-4 pt-2 border-b-2 border-zinc-700 pb-2">
            <div>
                <h1 class="text-xl pixel-font text-yellow-400">角色養成面板</h1>
                <p class="text-xs text-zinc-400"><span id="dash-info"></span> <span class="text-zinc-600" id="dash-empId"></span></p>
            </div>
            <div class="flex flex-col items-end">
                <div class="pixel-font bg-zinc-800 px-2 py-1 border border-zinc-600 text-[10px]" id="dash-level">素體階段</div>
            </div>
        </div>

        <div id="avatar-stage-container" class="relative w-full h-56 pixel-border flex flex-col items-center justify-end pb-2 mb-6 overflow-hidden transition-all duration-500 bg-zinc-800 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
            <div id="svg-avatar-wrapper" class="w-40 h-40 avatar-animate relative"></div>
            <div id="equipped-skills-display" class="absolute top-2 left-0 right-0 flex justify-center gap-2 px-4 flex-wrap"></div>
        </div>

        <div class="flex-grow space-y-3 overflow-y-auto pb-4">
            <h2 class="text-sm pixel-font text-zinc-400 mb-2">▶ 課程進化路徑</h2>

            <div class="bg-zinc-800 border-2 border-zinc-600 p-3 flex items-center gap-3 relative group" id="quest-1">
                <div class="bg-zinc-900 w-10 h-10 flex items-center justify-center text-xl border border-zinc-700" id="q1-icon">👔</div>
                <div class="flex-grow">
                    <div class="text-[10px] text-blue-400 pixel-font">模組一：管理基礎</div>
                    <div class="text-sm font-bold" id="q1-status-text">解鎖服裝款式</div>
                </div>
                <button id="btn-q1" onclick="showAvatarOptions(1)" class="pixel-btn bg-blue-600 text-xs pixel-font px-2 py-2 border-2 border-white min-w-[70px]">掃描解析</button>
            </div>

            <div class="bg-zinc-800 border-2 border-zinc-600 p-3 flex items-center gap-3 opacity-50 relative" id="quest-2">
                <div class="bg-zinc-900 w-10 h-10 flex items-center justify-center text-xl border border-zinc-700" id="q2-icon">❓</div>
                <div class="flex-grow">
                    <div class="text-[10px] text-orange-400 pixel-font">模組二：專業形象</div>
                    <div class="text-sm font-bold" id="q2-status-text">解鎖髮型與表情</div>
                </div>
                <button id="btn-q2" onclick="showAvatarOptions(2)" class="pixel-btn bg-zinc-700 text-xs pixel-font px-2 py-2 border-2 border-white min-w-[70px]" disabled>鎖定</button>
            </div>

            <div class="bg-zinc-800 border-2 border-zinc-600 p-3 flex items-center gap-3 opacity-50 relative" id="quest-3">
                <div class="bg-zinc-900 w-10 h-10 flex items-center justify-center text-xl border border-zinc-700" id="q3-icon">❓</div>
                <div class="flex-grow">
                    <div class="text-[10px] text-yellow-400 pixel-font">模組三：當責執行</div>
                    <div class="text-sm font-bold" id="q3-status-text">解鎖鞋款與姿勢</div>
                </div>
                <button id="btn-q3" onclick="showAvatarOptions(3)" class="pixel-btn bg-zinc-700 text-xs pixel-font px-2 py-2 border-2 border-white min-w-[70px]" disabled>鎖定</button>
            </div>

            <div class="bg-indigo-900/40 border-2 border-indigo-500 p-3 flex flex-col gap-2 opacity-50 mt-6" id="quest-final">
                <div class="flex items-center gap-3">
                    <div class="bg-indigo-950 w-10 h-10 flex items-center justify-center text-xl border border-indigo-400">⚔️</div>
                    <div class="flex-grow">
                        <div class="text-[10px] text-indigo-300 pixel-font">模組四：最終軍火庫</div>
                        <div class="text-sm font-bold text-indigo-100">實裝戰術技能卡 <span id="slot-count" class="text-yellow-400 text-xs">(0/3)</span></div>
                    </div>
                </div>
                <button id="btn-final" onclick="startQrScanner()" class="pixel-btn w-full bg-zinc-700 text-sm pixel-font py-2 border-2 border-white mt-1 flex items-center justify-center gap-2" disabled>
                    📷 開啟相機掃描實體卡
                </button>
            </div>
        </div>
    </div>

    <!-- 回應牆問題輸入 Modal -->
    <div id="question-modal" class="absolute inset-0 bg-zinc-950/95 z-50 hidden flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-zinc-900 border-2 border-yellow-500 p-6">
            <div id="question-step" class="text-xs pixel-font text-yellow-400 mb-2"></div>
            <div id="question-text" class="text-lg font-bold text-white mb-4 leading-snug"></div>
            <textarea id="question-answer" rows="3" placeholder="在這裡打下你的答案..." class="w-full bg-zinc-800 text-white p-3 border border-zinc-600 pixel-font outline-none resize-none text-sm mb-4"></textarea>
            <button onclick="submitQuestionAnswer()" class="pixel-btn w-full bg-yellow-500 text-black font-bold pixel-font py-3 border-2 border-white text-sm">提交並解鎖下一階段 →</button>
            <button onclick="closeModal('question-modal')" class="w-full text-zinc-500 text-xs mt-3 pixel-font py-2">跳過（直接解鎖）</button>
        </div>
    </div>

    <!-- 英雄卡（養成完成）Modal -->
    <div id="hero-modal" class="absolute inset-0 bg-zinc-950/95 z-[60] hidden flex-col items-center justify-center p-4 overflow-y-auto">
        <canvas id="hero-canvas" class="max-w-full max-h-[68vh] pixel-border bg-zinc-900"></canvas>
        <div class="w-full max-w-md mt-3">
            <label class="block text-[11px] pixel-font text-yellow-400 mb-1">把你寫在承諾牆的 30 天承諾打上去（會印在英雄卡上）</label>
            <textarea id="hero-commit" rows="2" oninput="drawHeroCard()" placeholder="我承諾在 30 天內，做＿＿，讓＿＿看到＿＿這個改變。" class="w-full bg-zinc-800 text-white p-2 border border-zinc-600 pixel-font outline-none resize-none text-xs"></textarea>
        </div>
        <div class="flex gap-3 mt-3">
            <button onclick="saveHeroCard()" class="pixel-btn bg-green-600 text-white px-5 py-3 pixel-font text-sm border-2 border-white">💾 儲存英雄卡</button>
            <button onclick="closeModal('hero-modal')" class="bg-zinc-700 text-white px-5 py-3 pixel-font text-sm border-2 border-zinc-500">關閉</button>
        </div>
    </div>

    <!-- 大螢幕投影畫面 -->
    <div id="screen-admin" class="screen flex-col h-screen w-full bg-zinc-950 p-6 overflow-hidden">
        <div class="flex justify-between items-center mb-6 pb-4 border-b border-zinc-800">
            <div>
                <h1 class="text-4xl pixel-font text-yellow-400 flex items-center gap-4">
                    <span class="animate-pulse">🔴</span> 良興主管公會 - 實戰公會牆
                </h1>
                <p class="text-zinc-500 mt-2">每 5 秒自動更新學員的最新進化狀態與戰術實裝。</p>
            </div>
            <div class="flex gap-4">
                <button onclick="switchScreen('screen-wordcloud')" class="pixel-btn bg-purple-700 px-4 py-3 text-white pixel-font border-2 border-white text-sm">
                    💬 回應牆
                </button>
                <button onclick="downloadCSV()" class="pixel-btn bg-green-600 px-6 py-3 text-white pixel-font border-2 border-white">
                    📊 下載訓練紀錄 (CSV)
                </button>
                <button onclick="switchScreen('screen-login'); clearInterval(adminPollingInterval); clearInterval(wordcloudInterval);" class="pixel-btn bg-zinc-700 px-4 py-3 text-white pixel-font border-2 border-zinc-500">
                    返回
                </button>
            </div>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4 overflow-y-auto pb-10 content-start">
        </div>
    </div>

    <!-- 回應牆大屏 -->
    <div id="screen-wordcloud" class="screen flex-col h-screen w-full bg-zinc-950 overflow-hidden relative">
        <style>
            @keyframes floatIn {
                0%   { opacity: 0; transform: translateY(30px) rotate(var(--rot)); }
                100% { opacity: 1; transform: translateY(0)     rotate(var(--rot)); }
            }
            .answer-chip { animation: floatIn 0.7s ease forwards; }
        </style>
        <div class="flex justify-between items-center px-8 py-4 border-b border-zinc-800 z-10 flex-shrink-0">
            <div>
                <div id="wc-question-label" class="text-xs pixel-font text-yellow-400 mb-1"></div>
                <div id="wc-question-text" class="text-xl font-bold text-white"></div>
            </div>
            <div class="flex gap-3">
                <button onclick="setWCQuestion(1)" id="wc-btn-1" class="pixel-btn px-3 py-2 text-xs pixel-font border-2 border-white bg-blue-700">Q1</button>
                <button onclick="setWCQuestion(2)" id="wc-btn-2" class="pixel-btn px-3 py-2 text-xs pixel-font border-2 border-white bg-zinc-700">Q2</button>
                <button onclick="setWCQuestion(3)" id="wc-btn-3" class="pixel-btn px-3 py-2 text-xs pixel-font border-2 border-white bg-zinc-700">Q3</button>
                <button onclick="switchScreen('screen-admin')" class="pixel-btn bg-zinc-700 px-4 py-2 text-white pixel-font border-2 border-zinc-500 text-xs">← 公會牆</button>
            </div>
        </div>
        <div id="wc-count" class="text-xs text-zinc-500 pixel-font px-8 py-1 flex-shrink-0"></div>
        <div id="wc-cloud" class="flex-1 flex flex-wrap gap-3 p-8 overflow-y-auto content-start items-start"></div>
    </div>

    <script>
        // ================= 資料庫與狀態設定 =================
        let userState = {
            empId: '', name: '', dept: '',
            quests: { q1: false, q2: false, q3: false },
            avatarConfig: { mod1: '', mod2: '', mod3: '' },
            equippedItems: []
        };

        let itemDB = {};

        // 後端 itemDB 的 color 可能填非 Tailwind 標準色名，會導致 class 靜默失效。
        // 用白名單過濾，非法色名一律 fallback 成 zinc。
        const SAFE_COLORS = new Set(['slate','gray','zinc','neutral','stone','red','orange','amber','yellow','lime','green','emerald','teal','cyan','sky','blue','indigo','violet','purple','fuchsia','pink','rose']);
        function safeColor(c) { return SAFE_COLORS.has(c) ? c : 'zinc'; }

        const avatarOptions = {
            1: [
                { id: 'suit',    title: '專業西裝',   desc: '制度與標準的捍衛者', icon: '👔', color: 'blue' },
                { id: 'casual',  title: '科技休閒服', desc: '敏捷與變通的引導者', icon: '👕', color: 'slate' },
                { id: 'uniform', title: '良興戰袍',   desc: '文化與現場的實踐者', icon: '🦺', color: 'red' }
            ],
            2: [
                { id: 'short', title: '自信短髮', desc: '果斷決策的風格',     icon: '👦',   color: 'orange' },
                { id: 'bun',   title: '專業包頭', desc: '邏輯清晰的翻譯官', icon: '👩‍🏫', color: 'stone' },
                { id: 'wavy',  title: '活力捲髮', desc: '同理傾聽的暖心者', icon: '👱‍♀️', color: 'yellow' }
            ],
            3: [
                { id: 'action',  title: '黑色戰鬥靴', desc: '專解難題的攻堅者', icon: '🥾', color: 'zinc' },
                { id: 'relaxed', title: '純白休閒鞋', desc: '步步為營的穩健者', icon: '👟', color: 'slate' },
                { id: 'sprint',  title: '熱血跑鞋',   desc: '自己造浪的先行者', icon: '🏃', color: 'red' }
            ]
        };

        let html5QrcodeScanner = null;
        let adminPollingInterval = null;
        let heroCardShown = false;   // 英雄卡是否已自動彈出過

        // ================= 核心輔助函式 =================

        function showLoader(text = '處理中...') {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('global-loader').style.display = 'flex';
        }
        function hideLoader() { document.getElementById('global-loader').style.display = 'none'; }
        function closeModal(id) {
            document.getElementById(id).classList.remove('flex');
            document.getElementById(id).classList.add('hidden');
        }

        // ================= 頁面載入：動態抓部門清單 =================
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await callAPI('getDepts');
                const select = document.getElementById('dept-input');
                if (res.success && res.depts.length > 0) {
                    select.innerHTML = res.depts.map(d => `<option value="${d}">${d}</option>`).join('');
                } else {
                    select.innerHTML = '<option value="">無法載入部門</option>';
                }
            } catch (err) {
                document.getElementById('dept-input').innerHTML = '<option value="">連線失敗，請重整</option>';
            }
        });

        // ================= API 呼叫邏輯（已換成 fetch）=================
        async function login() {
            const dept  = document.getElementById('dept-input').value;
            const name  = document.getElementById('name-input').value.trim();
            const empId = document.getElementById('password-input').value.trim().toUpperCase();

            if (!name || !empId) return alert('姓名與員編不可為空！');

            showLoader('聯絡人資資料庫驗證身分...');
            try {
                const res = await callAPI('login', { dept, name, empId });
                if (res.success) {
                    userState = res.userData;
                    await fetchItemDatabase();
                } else {
                    hideLoader();
                    alert(res.msg);
                }
            } catch (err) {
                hideLoader();
                alert('連線錯誤：' + err);
            }
        }

        async function fetchItemDatabase() {
            showLoader('同步雲端戰術圖鑑...');
            try {
                itemDB = await callAPI('getItems');
                hideLoader();
                renderDashboard();
                switchScreen('screen-dashboard');
            } catch (err) {
                hideLoader();
                alert('抓取戰術圖鑑失敗：' + err);
            }
        }

        // ================= Dashboard 渲染 =================
        function renderDashboard() {
            document.getElementById('dash-info').innerText = `${userState.dept} - ${userState.name}`;
            document.getElementById('dash-empId').innerText = `(ID:${userState.empId})`;
            document.getElementById('svg-avatar-wrapper').innerHTML = renderSVG(userState.avatarConfig);

            const skillsDiv = document.getElementById('equipped-skills-display');
            skillsDiv.innerHTML = userState.equippedItems.map(code => {
                const item = itemDB[code];
                if (!item) return '';
                const c = safeColor(item.color);
                return `<div class="bg-black/80 border border-${c}-500 w-8 h-8 flex items-center justify-center text-sm shadow-[0_0_10px_rgba(255,255,255,0.3)] rounded-full avatar-animate cursor-pointer" title="${item.title}">${item.icon}</div>`;
            }).join('');
            document.getElementById('slot-count').innerText = `(${userState.equippedItems.length}/3)`;

        function svgToImage(svgStr) {
            return new Promise((resolve, reject) => {
                const fixed = svgStr.replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
                const url = URL.createObjectURL(new Blob([fixed], { type: 'image/svg+xml;charset=utf-8' }));
                const im = new Image();
                im.onload = () => resolve(im);
                im.onerror = reject;
                im.src = url;
            });
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // 戰術卡代碼前綴 → 五力（用課綱「五力連線」原話當註腳）
        const FORCES = [
            { key: 'WAR', name: '暖心力', icon: '❤️', tag: '看見人' },
            { key: 'SUN', name: '陽光力', icon: '☀️', tag: '看見世界' },
            { key: 'FLA', name: '火焰力', icon: '🔥', tag: '向前走' },
            { key: 'EXC', name: '卓越力', icon: '🧭', tag: '做得好' },
            { key: 'ROC', name: '磐石力', icon: '🛡️', tag: '被信任' }
        ];

        function wrapText(ctx, text, x, y, maxW, lh, maxLines) {
            let line = '', lines = [];
            for (const ch of text) {
                if (ch === '\n') { lines.push(line); line = ''; continue; }
                const test = line + ch;
                if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = ch; }
                else line = test;
            }
            if (line) lines.push(line);
            if (lines.length > maxLines) { lines = lines.slice(0, maxLines); lines[maxLines - 1] = lines[maxLines - 1].slice(0, -1) + '…'; }
            lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
        }

        function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

        async function drawHeroCard() {
            const c = document.getElementById('hero-canvas');
            const W = 1080, H = 1560; c.width = W; c.height = H;
            const ctx = c.getContext('2d');
            try {
                await Promise.all([
                    document.fonts.load('900 64px "DotGothic16"'),
                    document.fonts.load('900 64px "Noto Sans TC"'),
                    document.fonts.load('500 30px "Noto Sans TC"')
                ]);
                await document.fonts.ready;
            } catch (e) {}

            ctx.fillStyle = '#18181b'; ctx.fillRect(0, 0, W, H);
            ctx.strokeStyle = '#f5b037'; ctx.lineWidth = 10; ctx.strokeRect(20, 20, W - 40, H - 40);
            ctx.textAlign = 'center';

            // 頂部橫帶（不下任何類型稱號）
            ctx.fillStyle = '#f5b037'; ctx.fillRect(20, 20, W - 40, 145);
            ctx.fillStyle = '#18181b'; ctx.font = '900 60px "DotGothic16","Noto Sans TC"';
            ctx.fillText('🏆 養成完成', W / 2, 118);

            // 角色舞台
            const sx = W / 2 - 175, sy = 185, ss = 350;
            const g = ctx.createLinearGradient(0, sy, 0, sy + ss);
            g.addColorStop(0, 'rgba(234,179,8,0.30)'); g.addColorStop(1, '#0f0f12');
            ctx.fillStyle = g; ctx.fillRect(sx, sy, ss, ss);
            ctx.strokeStyle = '#3f3f46'; ctx.lineWidth = 4; ctx.strokeRect(sx, sy, ss, ss);
            try {
                const img = await svgToImage(renderSVG(userState.avatarConfig, "290"));
                ctx.drawImage(img, W / 2 - 145, sy + 40, 290, 290);
            } catch (e) {}

            // 姓名 / 部門
            ctx.fillStyle = '#ffffff'; ctx.font = '900 58px "Noto Sans TC"';
            ctx.fillText(userState.name || '', W / 2, 595);
            ctx.fillStyle = '#a1a1aa'; ctx.font = '500 30px "Noto Sans TC"';
            ctx.fillText(`${userState.dept || ''}  ·  ID ${userState.empId || ''}`, W / 2, 636);

            ctx.strokeStyle = '#3f3f46'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(80, 672); ctx.lineTo(W - 80, 672); ctx.stroke();

            // 養成歷程（前面三個選擇）
            ctx.fillStyle = '#fbbf24'; ctx.font = '700 30px "DotGothic16","Noto Sans TC"'; ctx.textAlign = 'left';
            ctx.fillText('▶ 養成歷程', 60, 712);
            ctx.textAlign = 'center';
            [['服裝', 1, 'mod1'], ['髮型', 2, 'mod2'], ['姿勢', 3, 'mod3']].forEach((m, i) => {
                const x = W * (0.25 + 0.25 * i);
                const opt = getOpt(m[1], userState.avatarConfig[m[2]]);
                ctx.fillStyle = '#71717a'; ctx.font = '500 25px "Noto Sans TC"'; ctx.fillText(m[0], x, 758);
                ctx.font = '44px "Noto Sans TC"'; ctx.fillText(opt.icon, x, 812);
                ctx.fillStyle = '#e4e4e7'; ctx.font = '700 28px "Noto Sans TC"'; ctx.fillText(opt.title, x, 856);
            });

            // 我的五力裝備（只顯示有裝到的）
            ctx.fillStyle = '#fbbf24'; ctx.font = '700 30px "DotGothic16","Noto Sans TC"'; ctx.textAlign = 'left';
            ctx.fillText('▶ 我的五力裝備', 60, 920);

            const byForce = {};
            (userState.equippedItems || []).forEach(code => {
                const p = String(code).split('-')[0];
                const t = (itemDB[code] && itemDB[code].title) || code;
                (byForce[p] = byForce[p] || []).push(t);
            });

            const equippedForces = FORCES.map(f => ({ f, cards: byForce[f.key] || [] })).filter(o => o.cards.length > 0);
            const cw = 192, gap = 18, ch = 200, fcy = 945;
            const total = equippedForces.length * cw + (equippedForces.length - 1) * gap;
            const startX = (W - total) / 2;
            equippedForces.forEach((o, i) => {
                const x0 = startX + i * (cw + gap), cx = x0 + cw / 2;
                ctx.fillStyle = 'rgba(245,176,55,0.14)'; ctx.strokeStyle = '#f5b037'; ctx.lineWidth = 3;
                roundRect(ctx, x0, fcy, cw, ch, 12); ctx.fill(); ctx.stroke();
                ctx.textAlign = 'center';
                ctx.font = '42px "Noto Sans TC"'; ctx.fillStyle = '#fff'; ctx.fillText(o.f.icon, cx, fcy + 56);
                ctx.fillStyle = '#fbbf24'; ctx.font = '700 26px "Noto Sans TC"'; ctx.fillText(o.f.name, cx, fcy + 96);
                ctx.fillStyle = '#71717a'; ctx.font = '500 18px "Noto Sans TC"'; ctx.fillText(o.f.tag, cx, fcy + 122);
                ctx.fillStyle = '#e4e4e7'; ctx.font = '700 20px "Noto Sans TC"';
                o.cards.forEach((t, j) => ctx.fillText(truncate(t, 7), cx, fcy + 158 + j * 28));
            });

            // 30 天承諾
            const commit = (document.getElementById('hero-commit') && document.getElementById('hero-commit').value || '').trim();
            ctx.textAlign = 'left'; ctx.fillStyle = '#fbbf24'; ctx.font = '700 30px "DotGothic16","Noto Sans TC"';
            ctx.fillText('▶ 我的 30 天承諾', 60, 1215);
            ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.strokeStyle = '#52525b'; ctx.lineWidth = 2;
            roundRect(ctx, 40, 1240, W - 80, 215, 14); ctx.fill(); ctx.stroke();
            const text = commit || '我承諾在 30 天內，做＿＿，讓＿＿看到＿＿這個改變。';
            ctx.fillStyle = commit ? '#ffffff' : '#52525b';
            ctx.font = (commit ? '700 ' : 'italic 500 ') + '32px "Noto Sans TC"';
            wrapText(ctx, text, 70, 1305, W - 140, 46, 4);

            // 頁尾
            const d = new Date();
            ctx.textAlign = 'center'; ctx.fillStyle = '#71717a'; ctx.font = '500 26px "DotGothic16","Noto Sans TC"';
            ctx.fillText(`良興主管公會 · ${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`, W / 2, 1505);
        }

        function startQrScanner() {

            html5QrcodeScanner = new Html5Qrcode("qr-reader");

                    "⚠️ 無法直接開啟相機！\n\n" +

        function stopQrScanner() {
            closeModal('qr-scanner-modal');
            if (html5QrcodeScanner) {
                try {
                    html5QrcodeScanner.stop().then(() => {
                        html5QrcodeScanner.clear();
                    }).catch(e => {
                        html5QrcodeScanner.clear();
                    });

                    console.log("相機關閉時略過錯誤:", e);

        async function onScanSuccess(decodedText) {
            if (!decodedText.startsWith('TACTIC:')) return;
            const code = decodedText.split(':')[1];
            if (!itemDB[code]) return alert("無效的戰術代碼！資料庫找不到此設定。");
            if (userState.equippedItems.includes(code)) return alert("此戰術您已經實裝過了！");

            stopQrScanner();
            showLoader(`正在裝備 ${itemDB[code].title}...`);
            try {
                const res = await callAPI('equipItem', { empId: userState.empId, code });
                hideLoader();
                if (res.success) {
                    userState.equippedItems.push(code);
                    alert(`✨ 實裝成功：${itemDB[code].title} ✨`);
                    renderDashboard();
                } else {
                    alert(res.msg);
                }
            } catch (err) {
                hideLoader();
                alert('裝備失敗：' + err);
            }
        }

        // ================= 動態 SVG 渲染引擎 =================
        function renderSVG(config, size = "100%") {
            let skin = '#fcd34d', body = '#d4d4d8', pants = '#a1a1aa', shoes = 'transparent', extra = '';
            let armT = 'rotate(0)', rightArmT = 'rotate(0)', legT = 'rotate(0)';
            let hairBack = '', hairFront = '', faceFeatures = '';

            faceFeatures = `<circle cx="43" cy="28" r="2" fill="#171717"/><circle cx="57" cy="28" r="2" fill="#171717"/><path d="M 46 34 Q 50 38 54 34" stroke="#171717" stroke-width="2" stroke-linecap="round" fill="none"/>`;

            if (config.mod1 === 'suit')    { body = '#1e3a8a'; pants = '#0f172a'; extra = `<polygon points="48,40 52,40 50,56" fill="#dc2626"/>`; }
            else if (config.mod1 === 'casual')  { body = '#475569'; pants = '#1e293b'; }
            else if (config.mod1 === 'uniform') { body = '#1e3a8a'; pants = '#171717'; extra = `<rect x="52" y="44" width="10" height="4" fill="#ffffff" opacity="0.9" rx="1"/>`; }

            if (config.mod2 === 'short') {
                hairFront = `<path d="M 32 20 Q 50 8 68 20 L 68 14 Q 50 4 32 14 Z" fill="#3f2e21"/><rect x="40" y="22" width="6" height="2" fill="#3f2e21" transform="rotate(10 43 23)"/><rect x="54" y="22" width="6" height="2" fill="#3f2e21" transform="rotate(-10 57 23)"/>`;
            } else if (config.mod2 === 'bun') {
                hairBack  = `<circle cx="68" cy="20" r="7" fill="#0f172a"/>`;
                hairFront = `<path d="M 32 20 Q 50 8 68 20 L 68 14 Q 50 4 32 14 Z" fill="#0f172a"/>`;
                faceFeatures += `<rect x="36" y="25" width="10" height="6" fill="none" stroke="#171717" stroke-width="1.5" rx="1"/><rect x="54" y="25" width="10" height="6" fill="none" stroke="#171717" stroke-width="1.5" rx="1"/><line x1="46" y1="28" x2="54" y2="28" stroke="#171717" stroke-width="1.5"/>`;
            } else if (config.mod2 === 'wavy') {
                hairBack  = `<path d="M 28 20 Q 20 40 35 45 Q 38 40 32 30 Q 50 10 68 30 Q 62 40 65 45 Q 80 40 72 20 Z" fill="#78350f"/>`;
                hairFront = `<path d="M 32 22 Q 50 10 68 22 L 68 14 Q 50 4 32 14 Z" fill="#78350f"/>`;
                faceFeatures = `<circle cx="43" cy="28" r="2" fill="#171717"/><circle cx="57" cy="28" r="2" fill="#171717"/><path d="M 44 34 Q 50 40 56 34" stroke="#171717" stroke-width="2" stroke-linecap="round" fill="none"/>`;
            }

            if (config.mod3 === 'action')  { shoes = '#171717'; armT = 'rotate(-25 26 42)'; rightArmT = 'rotate(25 74 42)';  legT = 'rotate(-10 50 70)'; }
            else if (config.mod3 === 'relaxed') { shoes = '#f8fafc'; armT = 'rotate(10 26 42)';  rightArmT = 'rotate(-10 74 42)'; legT = 'rotate(0)'; }
            else if (config.mod3 === 'sprint')  { shoes = '#dc2626'; armT = 'rotate(45 26 42)';  rightArmT = 'rotate(-45 74 42)'; legT = 'rotate(-20 50 70)'; }

            return `<svg viewBox="0 0 100 100" width="${size}" height="${size}" style="overflow: visible;">
                ${hairBack}
                <g transform="${legT}">
                    <rect x="36" y="70" width="12" height="22" fill="${pants}" />
                    <rect x="34" y="92" width="16" height="6"  fill="${shoes}" rx="2"/>
                    <rect x="52" y="70" width="12" height="22" fill="${pants}" />
                    <rect x="50" y="92" width="16" height="6"  fill="${shoes}" rx="2"/>
                </g>
                <g transform="${armT}">
                    <rect x="20" y="42" width="12" height="26" fill="${skin}"  rx="4" />
                    <rect x="20" y="40" width="12" height="14" fill="${body}"  rx="2" />
                </g>
                <rect x="32" y="40" width="36" height="30" fill="${body}" rx="2" />
                ${extra}
                <g transform="${rightArmT}">
                    <rect x="68" y="42" width="12" height="26" fill="${skin}"  rx="4" />
                    <rect x="68" y="40" width="12" height="14" fill="${body}"  rx="2" />
                </g>
                <rect x="32" y="14" width="36" height="28" fill="${skin}" rx="8" />
                ${faceFeatures}
                ${hairFront}
            </svg>`;
        }

        // ================= 回應牆：問題解鎖流程 =================
        // ★ 密碼設定區 — 課前在這裡改成你想要的詞 ★
        const UNLOCK_CODES = { 1: 'A123', 2: 'B456', 3: 'C789' };

        const QUESTIONS = {
            1: { step: '第一關', text: '你今天來，最想帶回去一件什麼？' },

        // 流程：密碼 → 問題 → 選裝備
        function showAvatarOptions(modId) {
            const code = prompt(`請輸入第 ${modId} 關通關密碼：`);
            if (code === null) return; // 按取消
            if (code.trim().toUpperCase() !== UNLOCK_CODES[modId].toUpperCase()) {
                return alert('❌ 密碼錯誤！請向講師確認。');

            // 密碼正確 → 顯示問題框

            document.getElementById('question-modal').classList.remove('hidden');
            document.getElementById('question-modal').classList.add('flex');
        }

        async function submitQuestionAnswer() {
            const answer = document.getElementById('question-answer').value.trim();
            closeModal('question-modal');
            // 有答案才送出到回應牆
            if (answer && userState.empId) {
                try {
                    await callAPI('submitAnswer', {
                        empId: userState.empId,

                        answer
                    });
                } catch(e) { /* 靜默失敗，不阻擋解鎖 */ }
            }
            // 問題回答完 → 進選裝備
            showAvatarOptionsDirect(pendingModId);
        }

        function showAvatarOptionsDirect(modId) {
            const container = document.getElementById('scan-options-container');
            container.innerHTML = '';
            avatarOptions[modId].forEach(opt => {
                container.innerHTML += `
                    <div onclick="saveAvatarChoice(${modId}, '${opt.id}')" class="bg-${opt.color}-900/40 border-2 border-${opt.color}-500 p-3 flex items-center gap-4 cursor-pointer hover:bg-${opt.color}-800/80 transition-all card-pop-in">
                        <div class="text-3xl bg-${opt.color}-800 p-2 border border-black">${opt.icon}</div>
                        <div class="flex-1 text-left">
                            <div class="text-sm font-bold text-white mb-1">${opt.title}</div>
                            <div class="text-[10px] text-zinc-300 leading-tight">${opt.desc}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('scan-results-modal').classList.remove('hidden');
            document.getElementById('scan-results-modal').classList.add('flex');
        }

        // ================= 回應牆：文字雲大屏 =================
        let currentWCQuestion = 1;
        let wordcloudInterval = null;
        const FORCE_COLORS = ['#ED93B1','#FAC775','#F0997B','#85B7EB','#B4B2A9','#A5F3A0','#FDE68A','#C4B5FD'];

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'screen-admin' || screenId === 'screen-wordcloud') {
                document.getElementById('app-body').classList.remove('max-w-md', 'mx-auto');
            } else {
                document.getElementById('app-body').classList.add('max-w-md', 'mx-auto');
            }
            if (screenId === 'screen-wordcloud') {
                setWCQuestion(currentWCQuestion);
                wordcloudInterval = setInterval(() => fetchAndRenderWordCloud(currentWCQuestion), 5000);
            } else {
                clearInterval(wordcloudInterval);
            }
        }

        function setWCQuestion(qId) {
            currentWCQuestion = qId;
            const q = QUESTIONS[qId];
            document.getElementById('wc-question-label').innerText = q.step;
            document.getElementById('wc-question-text').innerText = q.text;
            [1,2,3].forEach(i => {
                document.getElementById(`wc-btn-${i}`).className =
                    `pixel-btn px-3 py-2 text-xs pixel-font border-2 border-white ${i === qId ? 'bg-yellow-500 text-black' : 'bg-zinc-700 text-white'}`;
            });
            fetchAndRenderWordCloud(qId);
        }

        async function fetchAndRenderWordCloud(qId) {
            try {
                const answers = await callAPI('getAnswers', { questionId: qId });
                renderWordCloud(answers);
            } catch(e) { /* 靜默失敗 */ }
        }

        function renderWordCloud(answers) {
            const cloud = document.getElementById('wc-cloud');
            document.getElementById('wc-count').innerText = `共 ${answers.length} 則回應`;
            cloud.innerHTML = '';
            if (answers.length === 0) {
                cloud.innerHTML = '<div class="text-zinc-600 pixel-font text-lg w-full text-center pt-20">等待學員回應中...</div>';
                return;
            }
            answers.forEach((ans, i) => {
                const rot = ((i * 7) % 21) - 10;
                const size = 13 + (i % 5) * 4;
                const color = FORCE_COLORS[i % FORCE_COLORS.length];
                const delay = Math.min(i * 0.08, 2);
                const chip = document.createElement('div');
                chip.className = 'answer-chip';
                chip.style.cssText = `
                    --rot: ${rot}deg;
                    font-size: ${size}px;
                    color: ${color};
                    background: rgba(255,255,255,0.04);
                    border: 1px solid ${color}55;
                    padding: 6px 12px;
                    border-radius: 4px;
                    max-width: 320px;
                    overflow-wrap: break-word;
                    word-break: normal;
                    line-height: 1.5;
                    animation-delay: ${delay}s;
                    opacity: 0;
                    font-family: 'Noto Sans TC', sans-serif;
                `;
                chip.innerHTML = `<span class="text-xs opacity-50 mr-1">${ans.name}</span>${ans.answer}`;
                cloud.appendChild(chip);
            });
        }

        // ================= 大螢幕投影（Polling）=================
        let allHeroesCache = [];

        async function openAdminBoard() {
            showLoader('載入戰術圖鑑...');
            try {
                itemDB = await callAPI('getItems');
                hideLoader();
                switchScreen('screen-admin');
                fetchAdminData();
                adminPollingInterval = setInterval(fetchAdminData, 5000);
            } catch (err) {
                hideLoader();
                alert('載入失敗：' + err);
            }
        }

        async function fetchAdminData() {
            try {
                const data = await callAPI('getAllHeroes');
                allHeroesCache = data;
                const grid = document.getElementById('admin-grid');
                grid.innerHTML = '';

                if (data.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-zinc-500 py-20 pixel-font text-xl">等待學員報到...</div>';
                    return;
                }

                data.forEach(user => {
                    let bg = 'bg-zinc-800 border-zinc-600';
                    let innerBg = "bg-zinc-800/50 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]";

                    if (user.quests.q3) {
                        bg = 'bg-yellow-900/20 border-yellow-600 shadow-[0_0_15px_rgba(234,179,8,0.3)]';
                        innerBg = "bg-gradient-to-t from-yellow-700/60 to-zinc-900";
                    } else if (user.quests.q2) {
                        bg = 'bg-orange-900/20 border-orange-600';
                        innerBg = "bg-gradient-to-t from-orange-900/60 to-zinc-900";
                    } else if (user.quests.q1) {
                        bg = 'bg-blue-900/20 border-blue-600';
                        innerBg = "bg-gradient-to-t from-blue-900/60 to-zinc-900";
                    }

                    let svg = renderSVG(user.avatarConfig, "100px");
                    let itemsHtml = user.equippedItemsCodes.map(code => {
                        const i = itemDB[code];
                        return i ? `<div class="text-[9px] bg-black border border-${safeColor(i.color)}-500 px-1 truncate w-full mt-1 text-left">${i.icon} ${i.title}</div>` : '';
                    }).join('');
                    if (!itemsHtml) itemsHtml = '<div class="text-[9px] text-zinc-600 mt-1">尚未實裝戰術</div>';

                    grid.innerHTML += `
                        <div class="border-2 ${bg} p-2 relative card-pop-in flex flex-col items-center text-center bg-zinc-900/90 h-64 overflow-hidden transition-all duration-500">
                            <div class="absolute top-1 left-1 pixel-font text-[8px] bg-black px-1 text-zinc-400 border border-zinc-700">ID:${user.empId}</div>
                            <div class="w-full h-24 mt-2 flex items-end justify-center ${innerBg} border border-zinc-700 pt-2 relative">
                                ${svg}
                            </div>
                            <div class="text-[9px] text-zinc-400 pixel-font mt-2 w-full truncate">${user.dept}</div>
                            <div class="text-sm font-black text-white w-full truncate">${user.name}</div>
                            <div class="w-full pt-1 border-t border-zinc-800 mt-auto">
                                ${itemsHtml}
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error('公會牆更新失敗:', err);
            }
        }

        function downloadCSV() {
            if (allHeroesCache.length === 0) return alert("無資料可下載");
            let csv = "data:text/csv;charset=utf-8,﻿";
            csv += "員編,部門,姓名,服裝(Mod1),髮型(Mod2),姿勢(Mod3),戰術1,戰術2,戰術3,最後更新時間\n";
            allHeroesCache.forEach(u => {
                const cfg = u.avatarConfig || {};
                const q1 = getOptTitle(1, cfg.mod1);
                const q2 = getOptTitle(2, cfg.mod2);
                const q3 = getOptTitle(3, cfg.mod3);
                const items = u.equippedItemsCodes || [];
                const t1 = itemDB[items[0]] ? `${items[0]} ${itemDB[items[0]].title}` : '';
                const t2 = itemDB[items[1]] ? `${items[1]} ${itemDB[items[1]].title}` : '';
                const t3 = itemDB[items[2]] ? `${items[2]} ${itemDB[items[2]].title}` : '';
                const row = [u.empId, u.dept, u.name, q1, q2, q3, t1, t2, t3, u.updatedAt].map(v => `"${v || ''}"`).join(",");
                csv += row + "\n";
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csv));
            link.setAttribute("download", `良興主管公會_戰術實裝報表_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
